frr defaults traditional
hostname spine
log stdout
!
! ── Loopback: IS-IS router identity + BGP update source ──
interface lo
 ip address 1.1.1.1/32
 ipv6 address fc00:0:0:1::1/128
 ip router isis UNDERLAY
 ipv6 router isis UNDERLAY
 isis passive
!
! ── Fabric-facing interfaces: one per PE ──
interface eth1
 description to-pe1
 ip router isis UNDERLAY
 ipv6 router isis UNDERLAY
 isis network point-to-point
!
interface eth2
 description to-pe2
 ip router isis UNDERLAY
 ipv6 router isis UNDERLAY
 isis network point-to-point
!
interface eth3
 description to-pe3
 ip router isis UNDERLAY
 ipv6 router isis UNDERLAY
 isis network point-to-point
!
! ── IS-IS: Level-1 underlay, dual-stack, SRv6 enabled ──
! IS-IS provides the IGP reachability that BGP loopback sessions
! ride on, and advertises each node's SRv6 locator prefix so the
! fabric knows how to forward SRv6-encapsulated packets.
router isis UNDERLAY
 is-type level-1
 net 49.0000.0000.0000.0001.00
 topology ipv6-unicast
 log-adjacency-changes
 segment-routing on
 segment-routing srv6
  locator MAIN
 exit
exit
!
! ── BGP: iBGP route-reflector for VPN families ──
! The spine reflects ipv4-vpn and ipv6-vpn routes between PEs.
! PEs peer using their IS-IS loopback addresses (fc00:0:0:1::X).
router bgp 65500
 bgp router-id 1.1.1.1
 no bgp default ipv4-unicast
 bgp default ipv6-unicast
 no bgp network import-check
 bgp allow-martian-nexthop
 !
 neighbor PE peer-group
 neighbor PE remote-as 65500
 neighbor PE capability dynamic
 neighbor PE capability extended-nexthop
 neighbor PE update-source lo
 neighbor fc00:0:0:1::16 peer-group PE
 neighbor fc00:0:0:1::17 peer-group PE
 neighbor fc00:0:0:1::18 peer-group PE
 !
 address-family ipv4 vpn
  neighbor PE activate
  neighbor PE route-reflector-client
 exit-address-family
 !
 address-family ipv6 vpn
  neighbor PE activate
  neighbor PE route-reflector-client
 exit-address-family
exit
!
! ── SRv6 global config: locator definition ──
! block-len 32 + node-len 16 = 48-bit prefix; "behavior usid"
! enables micro-SID encoding where multiple instructions pack
! into a single 128-bit address.
segment-routing
 srv6
  encapsulation
   source-address fc00:0:0:1::1
  locators
   locator MAIN
    prefix fd00:30:1::/48 block-len 32 node-len 16
    behavior usid
   exit
  exit
 exit
exit
!
end
